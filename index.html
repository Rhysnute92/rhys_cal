<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#27ae60">
    <title>Fitness Tracker Pro | Dashboard</title>

    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="rhys_logo.png">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">

    <link rel="stylesheet" href="shared.css">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div id="splash-screen">
    <div class="splash-content">
        <h1 class="splash-title">Welcome to Fitness Tracker Pro</h1>
        <p class="splash-text">Track your macros and training days with ease.</p>
        <div class="splash-buttons">
            <button onclick="window.location.href='register.html'" class="btn-primary">Get Started</button>
            <button onclick="window.location.href='login.html'" class="btn-outline">I have an account</button>
        </div>
    </div>
</div>

<header class="app-header">
    <img src="rhys_logo.png" class="header-logo" alt="Logo">
    <p id="currentDateDisplay" class="text-muted"></p>
</header>

<main class="container">
    <div class="card settings-shortcut" onclick="location.href='settings.html'">
        <div class="shortcut-content">
            <span class="icon">⚙️</span>
            <div class="text-stack">
                <h3>Settings</h3>
                <small class="text-muted">Account & Goals</small>
            </div>
        </div>
        <span class="arrow">→</span>
    </div>

    <section class="card nutrition-tile">
        <div class="flex-between">
            <h3 id="day-type-text">Training Day</h3>
            <label class="switch">
                <input type="checkbox" id="training-toggle" checked onchange="window.toggleTrainingMode(this)">
                <span class="slider"></span>
            </label>
        </div>
        
        <div class="ring-wrapper">
            <canvas id="calorieChart"></canvas>
            <div class="ring-text">
                <h2 id="displayRemaining">0</h2>
                <span>Remaining</span>
            </div>
        </div>

        <div class="stat-split">
            <div class="stat-block">
                <small>Goal</small>
                <strong id="displayGoal">0</strong>
            </div>
            <div class="stat-block">
                <small>Food</small>
                <strong id="displayFood">0</strong>
            </div>
        </div>
    </section>

    <div class="dashboard-grid">
        <div class="card stat-tile">
            <div class="flex-between">
                <h4>Steps</h4>
                <div id="stepIndicator" class="pulse-dot"></div>
            </div>
            <h2 id="liveSteps">0</h2>
            <div class="progress-track">
                <div id="stepFill" class="progress-fill"></div>
            </div>
            <button onclick="requestSensorPermission()" class="btn-mini">Enable Sensors</button>
        </div>

        <div class="card stat-tile">
            <div class="flex-between">
                <h4>Exercise</h4>
                <span>🔥</span>
            </div>
            <h2>148</h2>
            <small class="text-muted">cal burned</small>
        </div>
    </div>

    <div id="mainGrid" class="dashboard-grid"></div>

    <div class="action-footer">
        <button class="btn-primary" onclick="document.getElementById('addTileModal').style.display='flex'">+ Add Progress Tile</button>
        <button class="btn-outline" onclick="window.print()">📑 Export PDF</button>
    </div>
</main>

<div class="nav-wrapper">
    <nav class="nav-bar">
        <a href="index.html" class="nav-item active">
            <img src="dashboard.png" alt="home">
            <span>Home</span>
        </a>
        <a href="log.html" class="nav-item">
            <img src="diary.png" alt="diary">
            <span>Food</span>
        </a>
        <a href="training.html" class="nav-item">
            <img src="training.png" alt="gym">
            <span>Gym</span>
        </a>
    </nav>
</div>

<div id="addTileModal" class="modal-overlay">
    <div class="card modal-card">
        <h3>Add New Tile</h3>
        <select id="tileType" class="custom-select">
            <option value="water-intake">Water Intake</option>
            <option value="sleep-tracker">Sleep Tracker</option>
        </select>
        <div class="modal-actions">
            <button class="btn-primary" onclick="saveNewTile()">Add</button>
            <button class="btn-outline" onclick="document.getElementById('addTileModal').style.display='none'">Cancel</button>
        </div>
    </div>
</div>

<script type="module" src="index.js"></script>
</body>
</html>
