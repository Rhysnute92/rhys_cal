<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Fitness Flow | Dashboard</title>
    <link rel="stylesheet" href="dashboard.css">
    <link rel="stylesheet" href="shared.css">
    <link rel="stylesheet" href="log.css">
    <link rel="stylesheet" href="training.css">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" sizes="32x32" href="rhys_logo.png">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<body>

<header class="app-header">
    <div class="header-content">
        <img src="rhys_logo.png" class="header-logo" alt="Logo">
        <h1>Food Diary</h1>
    </div>
    <nav class="nav-wrapper">
    <div class="nav-bar">
        <a href="index.html" class="nav-item">
            <img src="dashboard.png" alt="home">
            <span>Home</span>
        </a>
        <a href="log.html" class="nav-item active">
            <img src="diary.png" alt="diary">
            <span>Food</span>
        </a>
        <a href="training.html" class="nav-item">
            <img src="training.png" alt="gym">
            <span>Gym</span>
        </a>
    </div>
</nav>
</header>

<main class="main-dashboard">
    <section id="authSection" class="card">
        <h3>Welcome</h3>
        <input type="email" id="email" placeholder="Email" class="input-field">
        <input type="password" id="password" placeholder="Password" class="input-field">
        <div class="scanner-actions">
            <button onclick="handleLogin()" class="btn-primary">Login</button>
            <button onclick="handleRegister()" class="btn-outline-small">Register</button>
        </div>
    </section>

    <div id="dashboardContent" class="hidden">
        <section class="card">
            <h3>Daily Calories</h3>
            <div class="progress-container">
                <svg class="progress-ring" width="120" height="120">
                    <circle class="progress-ring__background" stroke="#eee" stroke-width="8" fill="transparent" r="50" cx="60" cy="60"/>
                    <circle id="dashCircle" class="progress-ring__circle" stroke="#4CAF50" stroke-width="8" fill="transparent" r="50" cx="60" cy="60"/>
                </svg>
                <div class="progress-text">
                    <span id="dashKcal">0</span>
                    <small>remaining</small>
                </div>
            </div>
        </section>

        <section class="card">
            <h3>Recent Strength</h3>
            <canvas id="dashStrengthChart"></canvas>
        </section>
    </div>
</main>

<script type="module" src="dashboard.js"></script>
<script type="module" src="state.js"></script>
<script>
    if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js')
    .then(() => console.log("Service Worker Registered"))
    .catch(err => console.log("Service Worker Failed", err));
}
</script>
</body>
</html>
