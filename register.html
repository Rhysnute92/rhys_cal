<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get Started - Rhys Cal</title>

        <!-- PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Fitness">
    <link rel="manifest" href="manifest.json">

    <!-- Icons -->
    <link rel="icon" type="image/png" sizes="32x32" href="rhys_logo.png">
    <link rel="icon" type="image/x-icon" href="rhys_favicon.png">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">

    <link rel="stylesheet" href="register.css">
    <link rel="stylesheet" href="shared.css">

</head>
<body>

<div class="card">
    <h2>Get Started</h2>
    <p>Create an account or reset your password by entering a new one below.</p>
    
    <form id="registerForm">
        <input type="email" id="regEmail" placeholder="Email Address" required>
        <input type="password" id="regPassword" placeholder="New Password" required>
        <input type="password" id="confirmPassword" placeholder="Confirm New Password" required>
        
        <button type="submit" class="btn-green">Save & Login</button>
    </form>

    <a href="index.html" class="back-link">← Return to Home</a>
</div>
<script type="module" src="index.js"></script>
<script type="module" src="settings.js"></script>
<script type="module" src="pedometer.js"></script>
<script type="module" src="state.js"></script>
<script type="module" src="login.js"></script>
<script type="module" src="training.js"></script>
<script type="module" src="auth-actions.js"></script>
<script type="module" src="server.js"></script>
<script type="module" src="sw.js"></script>
<script type="module" src="settings.js"></script>
<script type="module">
    document.getElementById('registerForm').addEventListener('submit', (e) => {
        e.preventDefault();
        
        const pass = document.getElementById('regPassword').value;
        const confirm = document.getElementById('confirmPassword').value;

        if (pass !== confirm) {
            alert("Passwords do not match!");
            return;
        }

        // Logic to save user
        localStorage.setItem('user_account_created', 'true');
        localStorage.setItem('user_session', 'active');
        localStorage.setItem('user_email', document.getElementById('regEmail').value);
        
        alert("Account secured! Redirecting to dashboard...");
        window.location.href = 'index.html';
    });
</script>

</body>
</html>
