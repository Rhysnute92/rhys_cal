<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Rhys Cal</title>

        <!-- PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Fitness">
    <link rel="manifest" href="manifest.json">

    <!-- Icons -->
    <link rel="icon" type="image/png" sizes="32x32" href="rhys_logo.png">
    <link rel="icon" type="image/x-icon" href="rhys_favicon.png">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">

    <link rel="stylesheet" href="register.css">
    <link rel="stylesheet" href="shared.css">
</head>
<body>

<div class="auth-card">
    <div class="auth-login;">
        <h2 class="welcome;">Welcome Back</h2>
        <p class="macros">Log in to track your macros</p>
    </div>

    <form id="loginForm">
        <input type="email" id="loginEmail" class="auth-input" placeholder="Email Address" required>
        <input type="password" id="loginPass" class="auth-input" placeholder="Password" required>
        
        <button type="submit" class="btn-green">Login</button>
    </form>
    
    <div class="login-options">
        <label class="checkbox-container">
            <input type="checkbox" id="remember-me">
            <span class="checkmark"></span>
            Remember Me
        </label>
    </div>

    <div class="password-new">
        <p class="macros;">
            New user or forgot password?
        </p>
        <a href="register.html" class="nav-link">Create Account / Reset</a>
    </div>

    <a href="index.html" class="secondary-link">← Back to Home</a>
</div>



<script type="module" src="index.js"></script>
<script type="module" src="settings.js"></script>
<script type="module" src="pedometer.js"></script>
<script type="module" src="state.js"></script>
<script type="module" src="login.js"></script>
<script type="module" src="training.js"></script>
<script type="module" src="auth-actions.js"></script>
<script type="module" src="server.js"></script>
<script type="module" src="sw.js"></script>
<script type="module" src="settings.js"></script>
</body>
</html>
