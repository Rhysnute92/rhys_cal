<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#4CAF50">
    <title>Fitness Tracker Pro | Food Diary</title>

    <meta name="mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">

    <link rel="icon" type="image/png" sizes="32x32" href="rhys_logo.png">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">

    <link rel="stylesheet" href="shared.css">
    <link rel="stylesheet" href="log.css">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/quagga/dist/quagga.min.js"></script>
</head>
<body>

<header class="app-header">
    <div class="header-content">
        <img src="rhys_logo.png" class="header-logo" alt="Logo">
        <h1>Food Diary</h1>
    </div>
    <nav class="nav-wrapper">
    <div class="nav-bar">
        <a href="index.html" class="nav-item">
            <img src="dashboard.png" alt="home">
            <span>Home</span>
        </a>
        <a href="log.html" class="nav-item active">
            <img src="diary.png" alt="diary">
            <span>Food</span>
        </a>
        <a href="training.html" class="nav-item">
            <img src="training.png" alt="gym">
            <span>Gym</span>
        </a>
    </div>
</nav>
</header>

<main class="main-dashboard">
    
    <section class="card">
        <h3>Daily Targets</h3>
        <div class="grid-3-col">
            <div class="input-group">
                <label>Protein (g)</label>
                <input id="goalP" type="number" placeholder="0" class="input-field">
            </div>
            <div class="input-group">
                <label>Carbs (g)</label>
                <input id="goalC" type="number" placeholder="0" class="input-field">
            </div>
            <div class="input-group">
                <label>Fat (g)</label>
                <input id="goalF" type="number" placeholder="0" class="input-field">
            </div>
        </div>
        <button class="btn-secondary full-width" onclick="saveGoals()">Update Goals</button>
    </section>

    <section class="card">
        <h3>Log Meal</h3>
        <button class="btn-outline-small full-width" onclick="copyFromYesterday()">
            🕒 Copy from Yesterday
        </button>
        <div class="input-group">
            <input type="text" id="foodName" placeholder="Meal Name (e.g. Oats)" class="input-field">
            
            <div class="form-group">
                <select id="meal-type" title="Meal Type" class="custom-select">
                    <option>Breakfast</option>
                    <option>Lunch</option>
                    <option>Dinner</option>
                    <option>Snack</option>
                </select>
            </div>

            <div class="grid-4-col">
                <input id="calories" type="number" placeholder="kcal" class="input-field">
                <input id="protein" type="number" placeholder="P" class="input-field">
                <input id="carbs" type="number" placeholder="C" class="input-field">
                <input id="fat" type="number" placeholder="F" class="input-field">
            </div>

            <div class="scanner-actions">
                <button onclick="startBarcodeScanner()" class="btn-outline-small">📷 Barcode</button>
                <button onclick="startMealScan()" class="btn-outline-small">🥗 AI Scan</button>
            </div>

            <button onclick="saveEntry()" class="btn-primary full-width">Add to Diary</button>
        </div>
    </section>

    <section class="card">
        <h3>Quick Add</h3>
            <div class="quick-add-grid">
                <button class="btn-chip" onclick="quickAdd('Protein Shake', 25, 3, 2)">🥤 Shake</button>
                <button class="btn-chip" onclick="quickAdd('Apple', 0, 25, 0)">🍎 Apple</button>
                <button class="btn-chip" onclick="quickAdd('Chicken Breast (150g)', 46, 0, 5)">🍗 Chicken</button>
                <button class="btn-chip" onclick="quickAdd('Greek Yogurt', 15, 6, 0)">🍦 Yogurt</button>
            </div>
    </section>

    <section class="card progress-section">
        <div class="header-flex">
            <h3>Macros Today</h3>
            <span id="dayTotal" class="total-badge">0 / 2500 kcal</span>
        </div>
        <div class="chart-container">
            <canvas id="macroPie"></canvas>
        </div>
        <div class="progress-container">
    <svg class="progress-ring" width="120" height="120">
        <circle class="progress-ring__background" stroke="#eee" stroke-width="8" fill="transparent" r="50" cx="60" cy="60"/>
        <circle class="progress-ring__circle" stroke="#4CAF50" stroke-width="8" fill="transparent" r="50" cx="60" cy="60"/>
    </svg>
    <div class="progress-text">
        <span id="dayTotal">0 kcal</span>
        <small>of goal</small>
    </div>
</div>
        <div id="macroText" class="text-center"></div>
    </section>

    <section class="card">
        <div class="header-flex">
            <h3>History</h3>
            <input type="date" placeholder="Date" id="datePicker" class="date-input">
        </div>
        <div id="foodList" class="food-list">
            <p class="text-muted">No food logged yet today.</p>
        </div>
    </section>

    <section class="card">
            <h3>Nutrition Summary</h3>
                <table class="summary-table">
                    <thead>
                        <tr>
                            <th>Macro</th>
                            <th>Goal</th>
                            <th>Actual</th>
                            <th>Left</th>
                        </tr>
                    </thead>
                    <tbody id="summary-body">
                    </tbody>
            </table>
    </section>

    <section class="card">
        <h3>Last 7 Days</h3>
        <canvas id="weeklyChart"></canvas>
    </section>

</main>

<div id="cameraOverlay" class="camera-overlay">
    <div id="interactive" class="viewport"></div>
    <div class="scanner-controls">
        <button onclick="stopScanner()" class="btn-secondary">Cancel</button>
    </div>
</div>

<script type="module" src="state.js"></script>
<script type="module" src="log.js"></script> 
<script type="module" src="sw.js"></script>

</body>
</html>
